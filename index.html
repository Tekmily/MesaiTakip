<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesai Pro</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                fontFamily: { sans: ['Inter', 'sans-serif'] },
                extend: {
                    colors: {
                        orange: { 400: '#fb923c', 500: '#f97316' },
                        darkbg: '#0a0a0a',
                        cardbg: '#121212',
                        inputbg: '#1a1a1a',
                        bordercol: '#262626'
                    }
                }
            }
        }
    </script>
    
    <!-- İkonlar -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Bildirimler -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #404040; }
        
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { 
            filter: invert(1); 
            opacity: 0.5;
            cursor: pointer;
        }
        
        input[type="date"], input[type="time"] {
            position: relative;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen" class="flex flex-1 items-center justify-center p-4 transition-opacity duration-500 relative">
        <!-- Genel Arka Plan -->
        <div class="absolute inset-0 z-0 opacity-20 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=1920&q=80');"></div>
        <div class="absolute inset-0 z-0 bg-gradient-to-b from-darkbg/80 to-darkbg"></div>

        <div class="bg-cardbg/90 backdrop-blur-xl p-8 sm:p-10 rounded-2xl w-full max-w-md border border-bordercol relative z-10 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-orange-400/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-orange-400/20">
                    <i class="ph ph-clock text-3xl text-orange-400"></i>
                </div>
                <h1 class="text-2xl font-medium tracking-tight">Mesai Pro</h1>
                <p class="text-gray-400 mt-2 text-sm">Devam etmek için giriş yapın</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-2">Kullanıcı Adı</label>
                    <input type="text" id="usernameInput" required 
                        class="w-full bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-xl px-4 py-3 focus:border-orange-400 outline-none transition-colors text-white" 
                        placeholder="Örn: yusuf">
                </div>
                <button type="submit" class="w-full bg-orange-400 hover:bg-orange-500 text-black font-medium py-3 rounded-xl transition-colors shadow-lg shadow-orange-500/20">
                    Giriş Yap
                </button>
            </form>
        </div>
    </div>

    <!-- ANA EKRAN -->
    <div id="dashboardScreen" class="hidden flex-1 flex-col pb-20 fade-in relative">
        <!-- Üst Menü -->
        <header class="border-b border-bordercol bg-darkbg/90 backdrop-blur-xl sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2 text-orange-400 font-medium text-lg">
                    <i class="ph ph-clock text-xl"></i> Mesai Pro
                </div>
                <div class="flex items-center gap-4">
                    <button class="hidden sm:flex items-center gap-2 px-4 py-1.5 rounded-full border border-orange-400/30 text-orange-400 text-sm hover:bg-orange-400/10 transition-colors">
                        <i class="ph ph-device-mobile"></i> Uygulamayı İndir
                    </button>
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-inputbg border border-bordercol text-sm text-gray-300">
                        <div class="w-2 h-2 rounded-full bg-orange-400"></div>
                        <span id="displayUsername">yusuf</span>
                    </div>
                    <button class="text-gray-400 hover:text-white transition-colors"><i class="ph ph-sun text-lg"></i></button>
                    <button onclick="handleLogout()" class="text-gray-400 hover:text-white transition-colors"><i class="ph ph-sign-out text-lg"></i></button>
                </div>
            </div>
        </header>

        <main class="max-w-5xl w-full mx-auto px-4 py-8 space-y-6 relative z-10">
            
            <!-- Yeni Mesai Girişi -->
            <div class="bg-cardbg border border-bordercol rounded-2xl p-6 relative overflow-hidden">
                <!-- Arka Plan Resmi -->
                <div class="absolute inset-0 z-0 opacity-10 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1200&q=80');"></div>
                <!-- Turuncu Parlama -->
                <div class="absolute top-0 right-0 w-96 h-96 bg-orange-400/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none z-0"></div>
                
                <div class="relative z-10">
                    <h2 class="text-lg font-medium text-white flex items-center gap-2 mb-6">
                        <i class="ph ph-plus text-orange-400"></i> Yeni Mesai Girişi
                    </h2>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Tarih</label>
                            <input type="date" id="dateInput" class="w-full bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-xl px-4 py-3 text-white outline-none focus:border-orange-400 transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Başlangıç</label>
                            <input type="time" id="startInput" value="09:00" class="w-full bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-xl px-4 py-3 text-white outline-none focus:border-orange-400 transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Bitiş</label>
                            <input type="time" id="endInput" value="17:00" class="w-full bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-xl px-4 py-3 text-white outline-none focus:border-orange-400 transition-colors">
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 bg-inputbg/60 backdrop-blur-md border border-bordercol rounded-xl gap-4">
                        <div>
                            <div class="text-sm text-gray-400 mb-1">Hesaplanan Süre</div>
                            <div id="durationDisplay" class="text-xl font-medium text-orange-400">8 saat 0 dakika</div>
                        </div>
                        <button onclick="saveRecord()" id="saveBtn" class="w-full sm:w-auto bg-orange-400 hover:bg-orange-500 text-black font-medium px-6 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-orange-500/20">
                            <i class="ph ph-floppy-disk text-lg"></i> Kaydet
                        </button>
                    </div>
                </div>
            </div>

            <!-- Özet ve İş İlanları (Yan Yana) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Özet -->
                <div class="bg-cardbg border border-bordercol rounded-2xl p-6 flex flex-col relative overflow-hidden">
                    <!-- Arka Plan Resmi -->
                    <div class="absolute inset-0 z-0 opacity-10 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&q=80');"></div>
                    
                    <div class="relative z-10 flex-1 flex flex-col">
                        <h2 class="text-lg font-medium text-white flex items-center gap-2 mb-6">
                            <i class="ph ph-chart-line-up text-orange-400"></i> Özet
                        </h2>
                        <div class="space-y-4 flex-1 flex flex-col justify-center">
                            <div class="bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-xl p-5">
                                <div class="text-sm text-gray-400 mb-2">Toplam Mesai</div>
                                <div class="text-4xl text-white font-light">
                                    <span id="totalH">0</span> <span class="text-xl text-gray-500 mr-2">sa</span> <span id="totalM">0</span> <span class="text-xl text-gray-500">dk</span>
                                </div>
                            </div>
                            <div class="bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-xl p-5">
                                <div class="text-sm text-gray-400 mb-2">Kayıt Sayısı</div>
                                <div id="totalCount" class="text-2xl text-white font-light">0</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- İş İlanları -->
                <div class="bg-cardbg border border-bordercol rounded-2xl p-6 flex flex-col relative overflow-hidden">
                    <!-- Arka Plan Resmi -->
                    <div class="absolute inset-0 z-0 opacity-10 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&q=80');"></div>
                    
                    <div class="relative z-10 flex-1 flex flex-col">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-medium text-white flex items-center gap-2">
                                <i class="ph ph-briefcase text-orange-400"></i> Yakındaki İş İlanları
                            </h2>
                            <span id="locationBadge" class="text-xs bg-inputbg/80 backdrop-blur-sm text-gray-400 px-2 py-1 rounded border border-bordercol hidden flex items-center gap-1">
                                <i class="ph ph-map-pin"></i> <span id="locationText">Aranıyor...</span>
                            </span>
                        </div>
                        
                        <div id="jobsContainer" class="space-y-3 flex-1 overflow-y-auto max-h-[250px] pr-2">
                            <!-- Yükleniyor Durumu -->
                            <div class="h-full flex flex-col items-center justify-center text-gray-500 text-sm py-8">
                                <i class="ph ph-spinner animate-spin text-3xl mb-3 text-orange-400/50"></i>
                                <p>Konumunuz bulunuyor ve ilanlar yükleniyor...</p>
                                <button onclick="loadJobs()" class="mt-4 px-4 py-2 bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-lg hover:text-white transition-colors">
                                    Konum İzni Ver
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Geçmiş Kayıtlar -->
            <div class="bg-cardbg border border-bordercol rounded-2xl p-6 relative overflow-hidden">
                <!-- Arka Plan Resmi -->
                <div class="absolute inset-0 z-0 opacity-10 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1200&q=80');"></div>
                
                <div class="relative z-10">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
                        <h2 class="text-lg font-medium text-white flex items-center gap-2">
                            <i class="ph ph-file-text text-orange-400"></i> Geçmiş Kayıtlar
                        </h2>
                        
                        <div class="flex flex-wrap items-center gap-2">
                            <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="importCSV(event)">
                            <input type="file" id="txtInput" accept=".txt" class="hidden" onchange="importTXT(event)">
                            
                            <button onclick="document.getElementById('csvInput').click()" class="px-3 py-2 bg-inputbg/80 backdrop-blur-sm hover:bg-bordercol border border-bordercol text-gray-300 text-sm font-medium rounded-lg flex items-center gap-2 transition-colors">
                                <i class="ph ph-upload-simple"></i> CSV İçe
                            </button>
                            <button onclick="document.getElementById('txtInput').click()" class="px-3 py-2 bg-inputbg/80 backdrop-blur-sm hover:bg-bordercol border border-bordercol text-gray-300 text-sm font-medium rounded-lg flex items-center gap-2 transition-colors">
                                <i class="ph ph-upload-simple"></i> TXT İçe
                            </button>
                            <button onclick="exportNotes()" class="px-3 py-2 bg-inputbg/80 backdrop-blur-sm hover:bg-bordercol border border-bordercol text-gray-300 text-sm font-medium rounded-lg flex items-center gap-2 transition-colors">
                                <i class="ph ph-share-network"></i> Notlara
                            </button>
                            <button onclick="exportTXT()" class="px-3 py-2 bg-inputbg/80 backdrop-blur-sm hover:bg-bordercol border border-bordercol text-gray-300 text-sm font-medium rounded-lg flex items-center gap-2 transition-colors">
                                <i class="ph ph-download-simple"></i> TXT
                            </button>
                            <button onclick="exportCSV()" class="px-3 py-2 bg-inputbg/80 backdrop-blur-sm hover:bg-bordercol border border-bordercol text-gray-300 text-sm font-medium rounded-lg flex items-center gap-2 transition-colors">
                                <i class="ph ph-download-simple"></i> CSV
                            </button>
                            <button onclick="clearAll()" class="px-3 py-2 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-500 text-sm font-medium rounded-lg flex items-center gap-2 transition-colors ml-auto sm:ml-2">
                                <i class="ph ph-trash"></i> Temizle
                            </button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto bg-inputbg/40 backdrop-blur-md rounded-xl border border-bordercol">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="text-gray-400 border-b border-bordercol bg-inputbg/50">
                                <tr>
                                    <th class="px-4 py-4 font-medium">Tarih</th>
                                    <th class="px-4 py-4 font-medium">Başlangıç</th>
                                    <th class="px-4 py-4 font-medium">Bitiş</th>
                                    <th class="px-4 py-4 font-medium">Süre</th>
                                    <th class="px-4 py-4 font-medium text-right">İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTableBody" class="divide-y divide-bordercol">
                                <!-- Kayıtlar buraya JS ile eklenecek -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- JAVASCRIPT MANTIĞI -->
    <script>
        let currentUser = null;
        let records = [];

        const today = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
        document.getElementById('dateInput').max = today;

        const savedUser = localStorage.getItem('mesai_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showDashboard();
        }

        document.getElementById('startInput').addEventListener('input', updateDurationDisplay);
        document.getElementById('endInput').addEventListener('input', updateDurationDisplay);

        function showToast(text, isError = false) {
            Toastify({
                text: text, duration: 3000, gravity: "bottom", position: "right",
                style: {
                    background: isError ? "#ef4444" : "#f97316", color: isError ? "#fff" : "#000",
                    borderRadius: "0.5rem", padding: "12px 24px", fontWeight: "500",
                    boxShadow: "0 10px 15px -3px rgba(0, 0, 0, 0.1)"
                }
            }).showToast();
        }

        function handleLogin(e) {
            e.preventDefault();
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) return;
            currentUser = { id: name.toLowerCase().replace(/\s+/g, '-'), name };
            localStorage.setItem('mesai_user', JSON.stringify(currentUser));
            showDashboard();
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('mesai_user');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('usernameInput').value = '';
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('flex');
            document.getElementById('displayUsername').innerText = currentUser.name;
            loadRecords();
            loadJobs(); // İş ilanlarını yüklemeyi başlat
        }

        // --- İŞ İLANLARI MANTIĞI ---
        function loadJobs() {
            const container = document.getElementById('jobsContainer');
            const badge = document.getElementById('locationBadge');
            const locText = document.getElementById('locationText');
            
            container.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-gray-500 text-sm py-8">
                    <i class="ph ph-spinner animate-spin text-3xl mb-3 text-orange-400"></i>
                    <p>Konum aranıyor...</p>
                </div>
            `;

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    try {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await res.json();
                        
                        const city = data.address.city || data.address.town || data.address.province || data.address.state || 'Bulunduğunuz Bölge';
                        
                        badge.classList.remove('hidden');
                        locText.innerText = city;

                        const jobTitles = [
                            { title: 'Satış Danışmanı', type: 'Tam Zamanlı' },
                            { title: 'Kurye / Dağıtım', type: 'Yarı Zamanlı' },
                            { title: 'Müşteri Temsilcisi', type: 'Uzaktan / Hibrit' },
                            { title: 'Depo Görevlisi', type: 'Tam Zamanlı' },
                            { title: 'Ön Muhasebe', type: 'Tam Zamanlı' }
                        ];

                        container.innerHTML = '';
                        
                        jobTitles.forEach(job => {
                            const searchQuery = encodeURIComponent(`${job.title} iş ilanları ${city}`);
                            const googleJobsUrl = `https://www.google.com/search?q=${searchQuery}&ibp=htl;jobs`;
                            
                            container.innerHTML += `
                                <div class="bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-xl p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-orange-400/50 transition-colors group">
                                    <div>
                                        <h3 class="text-white font-medium group-hover:text-orange-400 transition-colors">${job.title}</h3>
                                        <div class="flex items-center gap-2 mt-1.5">
                                            <span class="text-gray-400 text-xs flex items-center gap-1"><i class="ph ph-map-pin"></i> ${city}</span>
                                            <span class="w-1 h-1 rounded-full bg-bordercol"></span>
                                            <span class="text-gray-400 text-xs">${job.type}</span>
                                        </div>
                                    </div>
                                    <a href="${googleJobsUrl}" target="_blank" rel="noopener noreferrer" class="w-full sm:w-auto px-4 py-2 bg-orange-400/10 hover:bg-orange-400/20 text-orange-400 text-sm font-medium rounded-lg transition-colors text-center border border-orange-400/20 flex items-center justify-center gap-2">
                                        Başvur <i class="ph ph-arrow-up-right"></i>
                                    </a>
                                </div>
                            `;
                        });

                    } catch (e) {
                        showJobsError("Konum bilgisi alınamadı.");
                    }
                }, (error) => {
                    showJobsError("Konum izni verilmedi. İlanları görmek için tarayıcı ayarlarından izin verin.");
                });
            } else {
                showJobsError("Tarayıcınız konum özelliğini desteklemiyor.");
            }
        }

        function showJobsError(msg) {
            const container = document.getElementById('jobsContainer');
            container.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-gray-500 text-sm py-8 text-center px-4">
                    <i class="ph ph-warning-circle text-3xl mb-3 text-red-400/50"></i>
                    <p>${msg}</p>
                    <button onclick="loadJobs()" class="mt-4 px-4 py-2 bg-inputbg/80 backdrop-blur-sm border border-bordercol rounded-lg hover:text-white transition-colors">
                        Tekrar Dene
                    </button>
                </div>
            `;
        }
        // --- İŞ İLANLARI MANTIĞI SONU ---

        function loadRecords() {
            const saved = localStorage.getItem(`mesai_records_v4_${currentUser.id}`);
            records = saved ? JSON.parse(saved) : [];
            renderRecords();
        }

        function saveToStorage() {
            localStorage.setItem(`mesai_records_v4_${currentUser.id}`, JSON.stringify(records));
            renderRecords();
        }

        function calculateDuration(start, end) {
            if (!start || !end) return { valid: false, message: 'Saatleri girin' };
            let [sH, sM] = start.split(':').map(Number);
            let [eH, eM] = end.split(':').map(Number);
            let startMins = sH * 60 + sM;
            let endMins = eH * 60 + eM;
            if (endMins < startMins) endMins += 24 * 60; 
            let diff = endMins - startMins;
            let h = Math.floor(diff / 60);
            let m = diff % 60;
            return { valid: true, hours: h, minutes: m, text: `${h} saat ${m} dakika` };
        }

        function updateDurationDisplay() {
            const res = calculateDuration(document.getElementById('startInput').value, document.getElementById('endInput').value);
            const display = document.getElementById('durationDisplay');
            const btn = document.getElementById('saveBtn');
            if (res.valid) {
                if (res.hours > 18 || (res.hours === 18 && res.minutes > 0)) {
                    display.innerHTML = `<span class="text-red-500">Maks. 18 saat</span>`;
                    btn.disabled = true; btn.classList.add('opacity-50');
                } else {
                    display.innerHTML = res.text;
                    btn.disabled = false; btn.classList.remove('opacity-50');
                }
            } else {
                display.innerHTML = `<span class="text-red-500">${res.message}</span>`;
                btn.disabled = true; btn.classList.add('opacity-50');
            }
        }

        function checkOverlap(newDate, newStart, newEnd) {
            const getTs = (d, s, e) => {
                const st = new Date(`${d}T${s}`).getTime();
                let et = new Date(`${d}T${e}`).getTime();
                if (e < s) et += 24 * 60 * 60 * 1000;
                return { st, et };
            };
            const { st: nSt, et: nEt } = getTs(newDate, newStart, newEnd);
            for (let r of records) {
                const { st: rSt, et: rEt } = getTs(r.date, r.start, r.end);
                if (nSt < rEt && nEt > rSt) return true;
            }
            return false;
        }

        function saveRecord() {
            const date = document.getElementById('dateInput').value;
            const start = document.getElementById('startInput').value;
            const end = document.getElementById('endInput').value;
            
            if (date > today) return showToast('Gelecek tarihlere mesai ekleyemezsiniz.', true);
            
            const res = calculateDuration(start, end);
            if (!res.valid || res.hours > 18 || (res.hours === 18 && res.minutes > 0)) return;
            
            if (checkOverlap(date, start, end)) return showToast(`Bu saat aralığı çakışıyor!`, true);
            
            records.push({ id: Date.now(), date, start, end, hours: res.hours, minutes: res.minutes });
            records.sort((a, b) => a.date === b.date ? b.start.localeCompare(a.start) : b.date.localeCompare(a.date));
            
            saveToStorage();
            showToast('Mesai başarıyla kaydedildi');
        }

        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            saveToStorage();
            showToast('Kayıt silindi');
        }

        function clearAll() {
            if(records.length === 0) return showToast('Silinecek kayıt yok', true);
            if(confirm('Tüm kayıtları silmek istediğinize emin misiniz?')) {
                records = [];
                saveToStorage();
                showToast('Tüm kayıtlar temizlendi');
            }
        }

        function renderRecords() {
            const tbody = document.getElementById('recordsTableBody');
            tbody.innerHTML = '';
            let totalMins = 0;
            
            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">Kayıt bulunmuyor.</td></tr>`;
            } else {
                records.forEach(r => {
                    totalMins += (r.hours * 60) + r.minutes;
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-inputbg/80 transition-colors group';
                    tr.innerHTML = `
                        <td class="px-4 py-4 text-gray-300">${r.date.split('-').reverse().join('.')}</td>
                        <td class="px-4 py-4 text-gray-400">${r.start}</td>
                        <td class="px-4 py-4 text-gray-400">${r.end}</td>
                        <td class="px-4 py-4">
                            <span class="inline-flex items-center px-2.5 py-1 rounded bg-orange-400/10 text-orange-400 font-medium text-xs border border-orange-400/20">
                                ${r.hours}s ${r.minutes}dk
                            </span>
                        </td>
                        <td class="px-4 py-4 text-right">
                            <button onclick="deleteRecord(${r.id})" class="p-2 text-gray-500 hover:text-red-500 transition-colors">
                                <i class="ph ph-trash text-lg"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            
            document.getElementById('totalH').innerText = Math.floor(totalMins / 60);
            document.getElementById('totalM').innerText = totalMins % 60;
            document.getElementById('totalCount').innerText = records.length;
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        }

        function exportCSV() {
            if(!records.length) return showToast('Dışa aktarılacak kayıt yok', true);
            const headers = ['Tarih', 'Baslangic', 'Bitis', 'Saat', 'Dakika'];
            const rows = records.map(r => [r.date, r.start, r.end, r.hours, r.minutes]);
            const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            downloadFile(csvContent, `mesai_${new Date().toISOString().split('T')[0]}.csv`, 'text/csv;charset=utf-8;');
            showToast('CSV indirildi');
        }

        function exportTXT() {
            if(!records.length) return showToast('Dışa aktarılacak kayıt yok', true);
            let content = `Mesai Kayıtları Raporu\nOluşturulma: ${new Date().toLocaleDateString('tr-TR')}\n========================================\n\n`;
            let pMins = 0;
            records.forEach(r => {
                pMins += (r.hours * 60) + r.minutes;
                content += `${r.date.split('-').reverse().join('.')} | ${r.start} - ${r.end} | ${r.hours}s ${r.minutes}dk\n`;
            });
            content += `\n> Toplam: ${Math.floor(pMins / 60)} saat ${pMins % 60} dakika\n`;
            downloadFile(content, `mesai_rapor_${new Date().toISOString().split('T')[0]}.txt`, 'text/plain;charset=utf-8;');
            showToast('TXT indirildi');
        }

        function exportNotes() {
            if(!records.length) return showToast('Paylaşılacak kayıt yok', true);
            let content = `📊 Mesai Raporu\n\n`;
            let pMins = 0;
            records.forEach(r => {
                pMins += (r.hours * 60) + r.minutes;
                content += `▫️ ${r.date.split('-').reverse().join('.')} | ${r.start}-${r.end} | ${r.hours}s ${r.minutes}dk\n`;
            });
            content += `\n👉 Toplam: ${Math.floor(pMins / 60)}s ${pMins % 60}dk\n`;
            
            if (navigator.share) {
                navigator.share({ title: 'Mesai Kayıtları', text: content }).catch(console.error);
            } else {
                navigator.clipboard.writeText(content).then(() => showToast('Panoya kopyalandı!'));
            }
        }

        function importCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
                let added = 0;
                lines.slice(1).forEach(line => {
                    let parts = line.split(',').map(s => s.trim());
                    let date, start, end, hours, minutes;
                    
                    if(parts.length >= 5) {
                        if (parts.length === 6) {
                            [_, date, start, end, hours, minutes] = parts;
                        } else {
                            [date, start, end, hours, minutes] = parts;
                        }
                        
                        if (date && start && end && !checkOverlap(date, start, end)) {
                            records.push({ id: Date.now() + Math.random(), date, start, end, hours: Number(hours), minutes: Number(minutes) });
                            added++;
                        }
                    }
                });
                if(added > 0) {
                    records.sort((a, b) => a.date === b.date ? b.start.localeCompare(a.start) : b.date.localeCompare(a.date));
                    saveToStorage();
                    showToast(`${added} kayıt eklendi.`);
                } else {
                    showToast('Yeni kayıt bulunamadı veya çakışıyor.', true);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function importTXT(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
                let added = 0;
                lines.forEach(line => {
                    const match = line.match(/(\d{2}\.\d{2}\.\d{4})\s*\|\s*(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})\s*\|\s*(\d+)s\s*(\d+)dk/);
                    if (match) {
                        const date = match[1].split('.').reverse().join('-');
                        const start = match[2];
                        const end = match[3];
                        const hours = Number(match[4]);
                        const minutes = Number(match[5]);
                        
                        if (date && start && end && !checkOverlap(date, start, end)) {
                            records.push({ id: Date.now() + Math.random(), date, start, end, hours, minutes });
                            added++;
                        }
                    }
                });
                if(added > 0) {
                    records.sort((a, b) => a.date === b.date ? b.start.localeCompare(a.start) : b.date.localeCompare(a.date));
                    saveToStorage();
                    showToast(`${added} kayıt eklendi.`);
                } else {
                    showToast('Yeni kayıt bulunamadı veya çakışıyor.', true);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }
    </script>
</body>
